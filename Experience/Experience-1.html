<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label for="weather">选择今天的天气</label>
    <select name="" id="weather">
        <option value="">--请做出选择--</option>
        <option value="sunny">"晴天"</option>
        <option value="rainy">"雨天"</option>
        <option value="snowing">"雪天"</option>
        <option value="overcast">"阴天"</option>
    </select>
    <p></p>

    <script>
        const select = document.querySelector("select");
        const para = document.querySelector("p");

            select.addEventListener("change", setweater);

            function setweater() {
                const choice = select.value;


                if (choice === "sunny") {
                    para.textContent = "阳光明媚。穿上短裤吧！去海滩，或公园，吃个冰淇淋。";
                }
                else if (choice === "rainy") {
                    para.textContent = "外面下着雨；带上雨衣和雨伞，不要在外面呆太久。";
                }
                else if (choice === "snowing") {
                    para.textContent = "大雪纷飞，天寒地冻！最好呆在家里喝杯热巧克力，或者去堆个雪人。";
                }
                else if (choice === "overcast") {
                    para.textContent = "虽然没有下雨，但天空灰蒙蒙的，随时都可能变天，所以要带一件雨衣以防万一。";
                }
                else {
                    para.textContent = "";
                }
            }
    </script>
    </body>
</html>
