<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8"/>
    <title>JSON: Task 1</title>
    <style>
      p {
        color: purple;
        margin: 0.5em 0;
      }
    
      * {
        box-sizing: border-box;
      }
    
      textarea {
        display: block;
        margin: 1rem 0;
      }
    </style>
  </head>

  <body>
    <label for="name">你的名字:</label>
    <input type="text" name="name" id="name" value="Elyrene"/><br>
    <label for="time">输入延迟:</label>
    <input type="text" name="time" id="time" value="2000"/><br>
    <div><button id="alarm">设置定时器</button></div><br>
    <div id="output">请设置定时器</div>
  </body>
  <script>
    const name = document.querySelector("#name");
    const time = document.querySelector("#time");
    const output = document.querySelector("#output");
    const button = document.querySelector("#alarm");

    function alarm(person, delay) {
      return new Promise((resolve, reject) => {
        if (delay < 0){
          throw new Error(`delay is not allowed`);
        }
        window.setTimeout(() => {
          resolve(`Wake UP ${person}!`);
        }, delay);
      });
    }

    button.addEventListener("click", async() => {
      try{
        const message = await alarm(name.value, time.value);
        output.textContent = message;
      } catch (Error) {
        output.textContent = `Could not set Alarm ${Error}`;
      };
    });
  </script>
</html>
