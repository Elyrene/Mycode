<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8"/>
    <title>JSON: Task 1</title>
    <style>
      p {
        color: purple;
        margin: 0.5em 0;
      }
    
      * {
        box-sizing: border-box;
      }
    
      textarea {
        display: block;
        margin: 1rem 0;
      }
    </style>
  </head>

  <body>
    <label for="time">请设置时间(秒):</label>
    <input type="number" name="time" id="time" value="10"/>
    <button id="settime">设置定时器</button>
    <div><p id="output"></p></div>
  </body>
  <script>
    const time = document.querySelector("#time");
    const btn = document.querySelector("#settime");
    const output = document.querySelector("#output");

    function alarm(delay) {
      return new Promise((allow,reject) => {
        if (delay <= 0) {
          throw new Error(`time is not allow`);
        }
        window.setTimeout(() => {
          allow("time is out!");
        }, delay);
      });
    }

    btn.addEventListener("click", async() => {
      try {
        const message = await alarm(time.value * 1000);
        output.textContent = message;
      } catch (Error) {
        output.textContent = `Could not set time ${Error}`;
      }
    });
  </script>
</html>
